<span class=&quot;code-comment&quot;>// lib/data/cache.ts — CSV cache singleton</span>
<span class=&quot;code-keyword&quot;>import</span> Papa <span class=&quot;code-keyword&quot;>from</span> <span class=&quot;code-string&quot;>'papaparse'</span>;
<span class=&quot;code-keyword&quot;>import</span> fs <span class=&quot;code-keyword&quot;>from</span> <span class=&quot;code-string&quot;>'fs'</span>;

<span class=&quot;code-keyword&quot;>class</span> DataCache {
  <span class=&quot;code-keyword&quot;>private</span> cache = <span class=&quot;code-keyword&quot;>new</span> Map&amp;lt;string, any[]&amp;gt;();

  <span class=&quot;code-keyword&quot;>async</span> loadAll() {
    <span class=&quot;code-keyword&quot;>const</span> files = [
      <span class=&quot;code-string&quot;>'egg_db'</span>, <span class=&quot;code-string&quot;>'growth_db'</span>, <span class=&quot;code-string&quot;>'settlement_age_db'</span>,
      <span class=&quot;code-string&quot;>'settlement_size_db'</span>, <span class=&quot;code-string&quot;>'vertical_position_db'</span>,
      <span class=&quot;code-string&quot;>'pelagic_juvenile_db'</span>, <span class=&quot;code-string&quot;>'rafting_db'</span>,
      <span class=&quot;code-string&quot;>'swimming_ucrit_db'</span>, <span class=&quot;code-string&quot;>'swimming_iss_db'</span>
    ];
    <span class=&quot;code-keyword&quot;>for</span> (<span class=&quot;code-keyword&quot;>const</span> f <span class=&quot;code-keyword&quot;>of</span> files) {
      <span class=&quot;code-keyword&quot;>const</span> csv = fs.readFileSync(<span class=&quot;code-string&quot;>`database/${f}.csv`</span>, <span class=&quot;code-string&quot;>'utf-8'</span>);
      this.cache.set(f, Papa.parse(csv, { header: <span class=&quot;code-keyword&quot;>true</span> }).data);
    }
  }
}

<span class=&quot;code-comment&quot;>// pages/species/[name].tsx — ISR config</span>
<span class=&quot;code-keyword&quot;>export async function</span> getStaticProps({ params }) {
  <span class=&quot;code-keyword&quot;>const</span> data = <span class=&quot;code-keyword&quot;>await</span> cache.getSpecies(params.name);
  <span class=&quot;code-keyword&quot;>return</span> { props: { data }, revalidate: <span class=&quot;code-number&quot;>3600</span> };
