# CascadeSim nginx config
# Runs behind Traefik reverse proxy (handles SSL + domain routing)
# Traefik routes cascadesim.ingevision.cloud -> nginx on port 8097

server {
    listen 8097;
    server_name _;
    server_tokens off;

    root /var/www/cascadesim/dist;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;

        # No cache for index.html (so new deploys are picked up)
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # WebSocket proxy to y-websocket server
    location /ws {
        proxy_pass http://127.0.0.1:1234;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Long cache for hashed static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Block source maps from being served
    location ~* \.map$ {
        return 404;
    }

    # Health check (proxied from y-websocket)
    location /health {
        proxy_pass http://127.0.0.1:1234/health;
    }
}
