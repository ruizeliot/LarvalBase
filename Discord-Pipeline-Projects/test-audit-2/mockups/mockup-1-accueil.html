<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuizPub — Accueil</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Inter:wght@400;600;700&display=swap');
body{font-family:'Inter',sans-serif;background:#1a1a2e;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
.bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;background:radial-gradient(ellipse at 20% 50%,#16213e 0%,#1a1a2e 70%)}
.particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
.particle{position:absolute;border-radius:50%;animation:float 6s infinite ease-in-out;opacity:.15}
@keyframes float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-30px) scale(1.1)}}
.container{position:relative;z-index:2;text-align:center;max-width:480px;width:90%;padding:2rem}
.logo{font-family:'Fredoka One',cursive;font-size:3.5rem;margin-bottom:.5rem;background:linear-gradient(135deg,#e94560,#f5a623,#e94560);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200% 200%;animation:gradient 3s ease infinite;text-shadow:none;letter-spacing:2px}
@keyframes gradient{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.subtitle{color:#8899aa;font-size:1rem;margin-bottom:2.5rem;font-weight:400}
.pin-section{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:2rem;margin-bottom:1.5rem;backdrop-filter:blur(10px)}
.pin-label{font-size:.85rem;color:#8899aa;margin-bottom:.8rem;text-transform:uppercase;letter-spacing:2px;font-weight:600}
.pin-input{display:flex;gap:10px;justify-content:center;margin-bottom:1.2rem}
.pin-input input{width:52px;height:64px;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.1);border-radius:12px;color:#fff;font-size:1.8rem;text-align:center;font-weight:700;transition:all .2s;font-family:'Fredoka One',cursive}
.pin-input input:focus{outline:none;border-color:#e94560;background:rgba(233,69,96,.1);box-shadow:0 0 20px rgba(233,69,96,.2)}
.btn-join{width:100%;padding:16px;border:none;border-radius:14px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .25s;background:linear-gradient(135deg,#e94560,#c81d4e);color:#fff;box-shadow:0 4px 20px rgba(233,69,96,.3);font-family:'Inter',sans-serif}
.btn-join:hover{transform:translateY(-2px);box-shadow:0 6px 30px rgba(233,69,96,.5)}
.divider{display:flex;align-items:center;gap:1rem;margin:1.5rem 0;color:#556;font-size:.8rem;text-transform:uppercase;letter-spacing:2px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.1)}
.btn-create{width:100%;padding:16px;border:2px solid rgba(245,166,35,.3);border-radius:14px;font-size:1rem;font-weight:700;cursor:pointer;transition:all .25s;background:rgba(245,166,35,.08);color:#f5a623;font-family:'Inter',sans-serif}
.btn-create:hover{background:rgba(245,166,35,.15);border-color:#f5a623;transform:translateY(-2px);box-shadow:0 4px 20px rgba(245,166,35,.2)}
.footer{margin-top:2rem;font-size:.75rem;color:#445}
.emoji-float{position:fixed;font-size:2rem;animation:emojiRise 8s linear infinite;opacity:0;z-index:1}
@keyframes emojiRise{0%{opacity:0;transform:translateY(100vh) rotate(0deg)}10%{opacity:.6}90%{opacity:.6}100%{opacity:0;transform:translateY(-10vh) rotate(360deg)}}
</style>
</head>
<body>
<div class="bg"></div>
<div class="particles">
<div class="particle" style="width:200px;height:200px;background:#e94560;top:10%;left:-5%;animation-delay:0s"></div>
<div class="particle" style="width:150px;height:150px;background:#f5a623;top:60%;right:-3%;animation-delay:2s"></div>
<div class="particle" style="width:100px;height:100px;background:#0f3460;bottom:10%;left:30%;animation-delay:4s"></div>
</div>
<div class="emoji-float" style="left:10%;animation-delay:0s">🍺</div>
<div class="emoji-float" style="left:30%;animation-delay:2s">🧠</div>
<div class="emoji-float" style="left:50%;animation-delay:4s">🎯</div>
<div class="emoji-float" style="left:70%;animation-delay:6s">🏆</div>
<div class="emoji-float" style="left:90%;animation-delay:1s">🍻</div>
<div class="container">
<div class="logo">QuizPub</div>
<p class="subtitle">Le quiz de bar, version numérique 🍻</p>
<div class="pin-section">
<div class="pin-label">Code PIN de la partie</div>
<div class="pin-input">
<input type="text" maxlength="1" value="4" autofocus>
<input type="text" maxlength="1" value="2">
<input type="text" maxlength="1" value="0">
<input type="text" maxlength="1" value="">
<input type="text" maxlength="1" value="">
<input type="text" maxlength="1" value="">
</div>
<button class="btn-join">🎮 Rejoindre la partie</button>
</div>
<div class="divider"><span>ou</span></div>
<button class="btn-create">🎛️ Créer un quiz</button>
<div class="footer">QuizPub v1.0 — Fait pour les soirées entre potes</div>
</div>
<script>
document.querySelectorAll('.pin-input input').forEach((inp,i,all)=>{
  inp.addEventListener('input',()=>{if(inp.value&&i<all.length-1)all[i+1].focus()});
  inp.addEventListener('keydown',e=>{if(e.key==='Backspace'&&!inp.value&&i>0)all[i-1].focus()});
});
</script>
</body>
</html>
