<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuizPub — Écran Quizmaster</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Inter:wght@400;600;700&display=swap');
body{font-family:'Inter',sans-serif;background:#0d0d1a;color:#fff;min-height:100vh;display:flex;flex-direction:column;overflow:hidden}
.host-bar{padding:14px 2rem;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.5);border-bottom:1px solid rgba(255,255,255,.06)}
.host-left{display:flex;align-items:center;gap:1.5rem}
.logo{font-family:'Fredoka One',cursive;font-size:1.3rem;background:linear-gradient(135deg,#e94560,#f5a623);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.host-badge{background:rgba(233,69,96,.15);border:1px solid rgba(233,69,96,.3);color:#e94560;padding:4px 12px;border-radius:8px;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.q-progress{color:#667;font-size:.9rem}
.q-progress span{color:#fff;font-weight:700}
.timer-strip{width:100%;height:8px;background:rgba(255,255,255,.04)}
.timer-inner{height:100%;width:65%;background:linear-gradient(90deg,#27ae60,#f5a623,#e94560);border-radius:0 4px 4px 0;transition:width .1s}
.main-display{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem;position:relative}
.big-timer{font-family:'Fredoka One',cursive;font-size:6rem;color:#f5a623;text-shadow:0 0 60px rgba(245,166,35,.3);margin-bottom:1rem}
.question-display{font-size:2.2rem;font-weight:700;text-align:center;max-width:800px;line-height:1.3;margin-bottom:3rem}
.answers-display{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:900px;width:100%}
.answer-block{padding:24px;border-radius:16px;display:flex;align-items:center;gap:14px;position:relative}
.answer-block.a{background:linear-gradient(135deg,#e94560,#c81d4e)}
.answer-block.b{background:linear-gradient(135deg,#2d9cdb,#2185b8)}
.answer-block.c{background:linear-gradient(135deg,#f5a623,#d4911c)}
.answer-block.d{background:linear-gradient(135deg,#27ae60,#1e8c4e)}
.answer-letter{font-family:'Fredoka One',cursive;font-size:1.5rem;opacity:.6}
.answer-text{font-size:1.3rem;font-weight:700}
.answer-count{position:absolute;right:16px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.3);padding:6px 14px;border-radius:10px;font-weight:700;font-size:.9rem;display:flex;align-items:center;gap:4px}
.answer-count .bar{width:4px;height:20px;background:rgba(255,255,255,.5);border-radius:2px;display:inline-block}
.controls{padding:1.5rem 2rem;background:rgba(0,0,0,.4);border-top:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-between;align-items:center}
.player-stats{display:flex;gap:2rem}
.stat{text-align:center}
.stat-val{font-family:'Fredoka One',cursive;font-size:1.5rem;color:#f5a623}
.stat-label{font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:#556;margin-top:2px}
.control-btns{display:flex;gap:1rem}
.ctrl-btn{padding:14px 32px;border:none;border-radius:14px;font-weight:700;cursor:pointer;font-size:1rem;transition:all .2s;font-family:'Inter',sans-serif}
.ctrl-next{background:linear-gradient(135deg,#e94560,#c81d4e);color:#fff;box-shadow:0 4px 20px rgba(233,69,96,.3)}
.ctrl-next:hover{transform:translateY(-2px);box-shadow:0 6px 30px rgba(233,69,96,.5)}
.ctrl-skip{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:#aab}
.live-badge{position:fixed;top:80px;right:2rem;background:rgba(233,69,96,.15);border:1px solid rgba(233,69,96,.3);padding:6px 14px;border-radius:10px;font-size:.8rem;color:#e94560;font-weight:600;display:flex;align-items:center;gap:6px}
.live-dot{width:8px;height:8px;border-radius:50%;background:#e94560;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div class="host-bar">
<div class="host-left">
<span class="logo">QuizPub</span>
<span class="host-badge">🎙️ Quizmaster</span>
</div>
<div class="q-progress">Question <span>3</span> / 10</div>
</div>
<div class="timer-strip"><div class="timer-inner"></div></div>
<div class="main-display">
<div class="big-timer">13</div>
<div class="question-display">Quelle est la capitale de l'Australie ? 🇦🇺</div>
<div class="answers-display">
<div class="answer-block a"><span class="answer-letter">A</span><span class="answer-text">Sydney</span><div class="answer-count">3 👤</div></div>
<div class="answer-block b"><span class="answer-letter">B</span><span class="answer-text">Canberra</span><div class="answer-count">4 👤</div></div>
<div class="answer-block c"><span class="answer-letter">C</span><span class="answer-text">Melbourne</span><div class="answer-count">1 👤</div></div>
<div class="answer-block d"><span class="answer-letter">D</span><span class="answer-text">Perth</span><div class="answer-count">0 👤</div></div>
</div>
</div>
<div class="live-badge"><div class="live-dot"></div> LIVE — 8 joueurs</div>
<div class="controls">
<div class="player-stats">
<div class="stat"><div class="stat-val">8</div><div class="stat-label">Joueurs</div></div>
<div class="stat"><div class="stat-val">8/8</div><div class="stat-label">Réponses</div></div>
<div class="stat"><div class="stat-val">50%</div><div class="stat-label">Bonne rép.</div></div>
</div>
<div class="control-btns">
<button class="ctrl-btn ctrl-skip">⏭️ Passer</button>
<button class="ctrl-btn ctrl-next">Révéler la réponse →</button>
</div>
</div>
</body>
</html>
