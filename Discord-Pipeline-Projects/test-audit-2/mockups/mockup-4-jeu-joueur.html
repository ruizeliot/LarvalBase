<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuizPub — Écran Joueur</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Inter:wght@400;600;700&display=swap');
body{font-family:'Inter',sans-serif;background:#1a1a2e;color:#fff;min-height:100vh;display:flex;flex-direction:column}
.top-bar{padding:12px 20px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.4);border-bottom:1px solid rgba(255,255,255,.06)}
.q-counter{font-size:.85rem;color:#8899aa;font-weight:600}
.q-counter span{color:#e94560}
.score-display{font-family:'Fredoka One',cursive;color:#f5a623;font-size:1.1rem}
.timer-bar{width:100%;height:6px;background:rgba(255,255,255,.06)}
.timer-fill{height:100%;width:65%;background:linear-gradient(90deg,#27ae60,#f5a623);border-radius:0 3px 3px 0;transition:width .1s linear}
.timer-fill.warning{background:linear-gradient(90deg,#f5a623,#e94560)}
.main{flex:1;display:flex;flex-direction:column;align-items:center;padding:2rem 1.5rem;max-width:600px;margin:0 auto;width:100%}
.timer-circle{width:80px;height:80px;border-radius:50%;border:4px solid rgba(245,166,35,.3);display:flex;align-items:center;justify-content:center;margin-bottom:1.5rem;position:relative}
.timer-circle::before{content:'';position:absolute;width:100%;height:100%;border-radius:50%;border:4px solid transparent;border-top-color:#f5a623;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.timer-num{font-family:'Fredoka One',cursive;font-size:2rem;color:#f5a623}
.question-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:2rem;text-align:center;margin-bottom:2rem;width:100%;backdrop-filter:blur(5px)}
.question-text{font-size:1.4rem;font-weight:700;line-height:1.4}
.answers{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%}
.answer-btn{padding:20px 16px;border:none;border-radius:16px;color:#fff;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;position:relative;overflow:hidden;text-align:center;min-height:80px;display:flex;align-items:center;justify-content:center;gap:8px}
.answer-btn:active{transform:scale(.95)}
.answer-btn.a{background:linear-gradient(135deg,#e94560,#c81d4e);box-shadow:0 4px 15px rgba(233,69,96,.3)}
.answer-btn.b{background:linear-gradient(135deg,#2d9cdb,#2185b8);box-shadow:0 4px 15px rgba(45,156,219,.3)}
.answer-btn.c{background:linear-gradient(135deg,#f5a623,#d4911c);box-shadow:0 4px 15px rgba(245,166,35,.3)}
.answer-btn.d{background:linear-gradient(135deg,#27ae60,#1e8c4e);box-shadow:0 4px 15px rgba(39,174,96,.3)}
.answer-btn:hover{transform:translateY(-3px);filter:brightness(1.1)}
.answer-btn .letter{font-family:'Fredoka One',cursive;font-size:1.3rem;opacity:.7}
.answer-btn.selected{animation:selectPulse .3s}
.answer-btn.selected::after{content:'✓';position:absolute;top:8px;right:12px;font-size:1.2rem}
@keyframes selectPulse{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
.streak{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(245,166,35,.15);border:1px solid rgba(245,166,35,.3);padding:8px 20px;border-radius:20px;font-size:.85rem;color:#f5a623;font-weight:600;display:flex;align-items:center;gap:6px}
</style>
</head>
<body>
<div class="top-bar">
<div class="q-counter">Question <span>3</span>/10</div>
<div class="score-display">⭐ 2,450 pts</div>
</div>
<div class="timer-bar"><div class="timer-fill"></div></div>
<div class="main">
<div class="timer-circle"><span class="timer-num">13</span></div>
<div class="question-card">
<div class="question-text">Quelle est la capitale de l'Australie ? 🇦🇺</div>
</div>
<div class="answers">
<button class="answer-btn a"><span class="letter">A</span> Sydney</button>
<button class="answer-btn b selected"><span class="letter">B</span> Canberra</button>
<button class="answer-btn c"><span class="letter">C</span> Melbourne</button>
<button class="answer-btn d"><span class="letter">D</span> Perth</button>
</div>
</div>
<div class="streak">🔥 3 bonnes réponses d'affilée !</div>
<script>
document.querySelectorAll('.answer-btn').forEach(btn=>{
  btn.addEventListener('click',function(){
    document.querySelectorAll('.answer-btn').forEach(b=>b.classList.remove('selected'));
    this.classList.add('selected');
  });
});
</script>
</body>
</html>
