<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuizPub — Lobby</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Inter:wght@400;600;700&display=swap');
body{font-family:'Inter',sans-serif;background:#1a1a2e;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow:hidden}
.bg-glow{position:fixed;width:600px;height:600px;border-radius:50%;filter:blur(150px);opacity:.15;pointer-events:none}
.bg-glow.a{background:#e94560;top:-200px;left:-100px}
.bg-glow.b{background:#2d9cdb;bottom:-200px;right:-100px}
.top-bar{width:100%;padding:1.2rem 2rem;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.3);border-bottom:1px solid rgba(255,255,255,.06);backdrop-filter:blur(10px);z-index:10}
.logo{font-family:'Fredoka One',cursive;font-size:1.3rem;background:linear-gradient(135deg,#e94560,#f5a623);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.pin-display{display:flex;align-items:center;gap:.8rem}
.pin-label{font-size:.7rem;text-transform:uppercase;letter-spacing:2px;color:#667}
.pin-code{font-family:'Fredoka One',cursive;font-size:2rem;letter-spacing:6px;color:#f5a623;background:rgba(245,166,35,.1);padding:6px 20px;border-radius:10px;border:1px solid rgba(245,166,35,.2)}
.content{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;width:100%;max-width:900px;position:relative;z-index:2}
.waiting-text{font-size:1.2rem;color:#8899aa;margin-bottom:.5rem}
.player-count{font-family:'Fredoka One',cursive;font-size:3rem;color:#fff;margin-bottom:2rem}
.player-count span{color:#e94560}
.players-grid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-bottom:3rem;max-width:700px}
.player-card{padding:12px 20px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:14px;display:flex;align-items:center;gap:10px;animation:popIn .4s cubic-bezier(.175,.885,.32,1.275);backdrop-filter:blur(5px)}
@keyframes popIn{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
.player-avatar{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem}
.player-name{font-weight:600;font-size:.95rem}
.player-card:nth-child(1) .player-avatar{background:rgba(233,69,96,.2)}
.player-card:nth-child(2) .player-avatar{background:rgba(45,156,219,.2)}
.player-card:nth-child(3) .player-avatar{background:rgba(245,166,35,.2)}
.player-card:nth-child(4) .player-avatar{background:rgba(39,174,96,.2)}
.player-card:nth-child(5) .player-avatar{background:rgba(155,89,182,.2)}
.player-card:nth-child(6) .player-avatar{background:rgba(233,69,96,.2)}
.player-card:nth-child(7) .player-avatar{background:rgba(45,156,219,.2)}
.player-card:nth-child(8) .player-avatar{background:rgba(245,166,35,.2)}
.dots{display:flex;gap:6px;margin-bottom:2rem}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2);animation:pulse 1.5s infinite}
.dot:nth-child(2){animation-delay:.3s}
.dot:nth-child(3){animation-delay:.6s}
@keyframes pulse{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:.8;transform:scale(1.3)}}
.start-btn{padding:18px 60px;background:linear-gradient(135deg,#27ae60,#1e8c4e);border:none;border-radius:16px;color:#fff;font-size:1.2rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;box-shadow:0 4px 25px rgba(39,174,96,.4);transition:all .25s;position:relative;overflow:hidden}
.start-btn:hover{transform:translateY(-3px);box-shadow:0 8px 35px rgba(39,174,96,.5)}
.start-btn::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(transparent,rgba(255,255,255,.1),transparent);transform:rotate(45deg);animation:shine 3s infinite}
@keyframes shine{0%{transform:translateX(-100%) rotate(45deg)}100%{transform:translateX(100%) rotate(45deg)}}
.quiz-info{position:absolute;bottom:2rem;display:flex;gap:2rem;color:#556;font-size:.8rem}
.quiz-info div{display:flex;align-items:center;gap:6px}
</style>
</head>
<body>
<div class="bg-glow a"></div>
<div class="bg-glow b"></div>
<div class="top-bar">
<div class="logo">QuizPub</div>
<div class="pin-display">
<span class="pin-label">Game PIN</span>
<div class="pin-code">420 691</div>
</div>
</div>
<div class="content">
<div class="waiting-text">En attente de joueurs...</div>
<div class="player-count"><span>8</span> joueurs connectés</div>
<div class="players-grid">
<div class="player-card" style="animation-delay:0s"><div class="player-avatar">🍺</div><div class="player-name">DJ Bière</div></div>
<div class="player-card" style="animation-delay:.1s"><div class="player-avatar">🧠</div><div class="player-name">BrainMaster</div></div>
<div class="player-card" style="animation-delay:.2s"><div class="player-avatar">🎯</div><div class="player-name">QuizKiller</div></div>
<div class="player-card" style="animation-delay:.3s"><div class="player-avatar">🦊</div><div class="player-name">FoxyTrivia</div></div>
<div class="player-card" style="animation-delay:.4s"><div class="player-avatar">🔥</div><div class="player-name">HotAnswer</div></div>
<div class="player-card" style="animation-delay:.5s"><div class="player-avatar">🍕</div><div class="player-name">PizzaBrain</div></div>
<div class="player-card" style="animation-delay:.6s"><div class="player-avatar">⚡</div><div class="player-name">SpeedyQuiz</div></div>
<div class="player-card" style="animation-delay:.7s"><div class="player-avatar">🎸</div><div class="player-name">RockTrivia</div></div>
</div>
<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
<button class="start-btn">🚀 Lancer la partie !</button>
<div class="quiz-info">
<div>📝 10 questions</div>
<div>⏱️ 20s par question</div>
<div>⚡ Scoring rapidité</div>
</div>
</div>
</body>
</html>
