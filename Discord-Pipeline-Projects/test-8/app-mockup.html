// Decode base64 to HTML string
function decodeMockup(id) {
  const b64 = mockups[id];
  if (!b64) return '';
  return decodeURIComponent(escape(atob(b64)));
}

// Cache blob URLs to avoid recreating them
const blobUrls = {};

function getBlobUrl(id) {
  if (!blobUrls[id]) {
    const html = decodeMockup(id);
    const blob = new Blob([html], { type: 'text/html; charset=utf-8' });
    blobUrls[id] = URL.createObjectURL(blob);
  }
  return blobUrls[id];
}

function renderNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = sections.map((s, i) =>
    `<button onclick="showSection(${i})" id="nav-${i}">
      <span class="icon">${s.icon}</span>
      <span class="label">${s.label}</span>
      <span class="status">mockup</span>
    </button>`
  ).join('');
}

function showSection(idx) {
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + idx).classList.add('active');
  const s = sections[idx];
  const main = document.getElementById('main');
  const url = getBlobUrl(s.id);
  main.innerHTML = `
    <div class="tab-header">
      <span class="section-icon">${s.icon}</span>
      ${s.label} — ${s.us}
    </div>
    <div class="iframe-container">
      <iframe src="${url}" sandbox="allow-scripts"></iframe>
    </div>
  `;
}

renderNav();
showSection(0);
</script>
